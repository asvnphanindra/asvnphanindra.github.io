<!DOCTYPE html>
<html>

<head>

<title>QR Attendance Scanner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

h2{
margin-bottom:5px;
}

#datetime{
color:#bbbbbb;
margin-bottom:20px;
}

#reader{
width:320px;
margin:auto;
margin-top:15px;
}

button{

background:#1e88e5;
color:white;
border:none;
padding:12px 18px;
font-size:16px;
border-radius:6px;
margin:5px;

}

button:hover{
background:#1565c0;
}

#preview{

display:none;
background:#1f1f1f;
padding:15px;
margin-top:20px;
border-radius:10px;

}

.field{
margin:8px;
font-size:18px;
}

</style>

</head>

<body>

<h2>QR Scanner</h2>

<div id="datetime"></div>

<button onclick="startScanner()">Start Scan</button>
<button onclick="stopScanner()">Stop Scan</button>
<button onclick="switchCamera()">Switch Camera</button>

<div id="reader"></div>

<div id="preview">

<h3>Verify Details</h3>

<div class="field">Roll: <span id="roll"></span></div>
<div class="field">Department: <span id="dept"></span></div>
<div class="field">Name: <span id="name"></span></div>
<div class="field">Year: <span id="year"></span></div>

<button onclick="openForm()">Open Google Form</button>

</div>

<script>

let html5QrCode;
let cameras=[];
let cameraIndex=0;
let scanned=false;
let formURL="";

/* Live Date Time */

function updateDateTime(){

let now=new Date();

document.getElementById("datetime").innerText=
now.toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();


/* Parse QR Data */

function parseData(text){

let parts=text.trim().split(/\s+/);

let roll=parts[0];
let dept=parts[1];
let year=parts[parts.length-1];

let name=parts.slice(2,parts.length-1).join(" ");

return{

roll:roll,
dept:dept,
name:name,
year:year

};

}


/* Start Scanner */

function startScanner(){

scanned=false;

html5QrCode=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices=>{

cameras=devices;

if(cameras.length){

/* Try to use back camera */

cameraIndex=0;

for(let i=0;i<cameras.length;i++){

if(cameras[i].label.toLowerCase().includes("back") ||
cameras[i].label.toLowerCase().includes("environment")){

cameraIndex=i;

break;

}

}

startCamera(cameraIndex);

}

});

}


/* Start specific camera */

function startCamera(index){

html5QrCode.start(

cameras[index].id,

{
fps:10,
qrbox:250
},

onScanSuccess

);

}


/* Stop Scanner */

function stopScanner(){

if(html5QrCode){

html5QrCode.stop();

}

}


/* Switch Camera */

function switchCamera(){

if(cameras.length>1){

cameraIndex=(cameraIndex+1)%cameras.length;

stopScanner();

setTimeout(()=>{

startCamera(cameraIndex);

},500);

}

}


/* QR Success */

function onScanSuccess(decodedText){

if(scanned) return;

scanned=true;

navigator.vibrate(200);

stopScanner();

let data=parseData(decodedText);

/* Show preview */

document.getElementById("roll").innerText=data.roll;
document.getElementById("dept").innerText=data.dept;
document.getElementById("name").innerText=data.name;
document.getElementById("year").innerText=data.year;

document.getElementById("preview").style.display="block";

/* Google Form URL */

formURL=
"https://docs.google.com/forms/d/e/FORM_ID/viewform?usp=pp_url"
+"&entry.111111="+encodeURIComponent(data.roll)
+"&entry.222222="+encodeURIComponent(data.dept)
+"&entry.333333="+encodeURIComponent(data.name)
+"&entry.444444="+encodeURIComponent(data.year);

}


/* Open Form */

function openForm(){

window.location.href=formURL;

}

</script>

</body>

</html>
